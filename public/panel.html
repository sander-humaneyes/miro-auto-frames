<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Frames Panel</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
    <script src="auto-frames.js" defer></script>
    <script src="panel.js" defer></script>
  </head>
  <body>
    <div class="panel-shell">
      <section class="card card--summary">
        <div class="section-title-row section-title-row--stacked">
          <div>
            <p class="eyebrow">Auto Frames</p>
            <h1>Resize selected frames</h1>
          </div>
          <span class="mini-pill mini-pill--neutral" id="frame-count">0 frames</span>
        </div>
        <p class="status-pill" id="selection-status">Select a frame</p>
        <p class="muted" id="selection-note">Selection updates automatically.</p>
      </section>

      <section class="card">
        <div class="section-title-row">
          <h2>Padding</h2>
          <span class="mini-pill">0 to 200 dp</span>
        </div>
        <label class="field" for="padding-input">
          <span class="field-label">Space inside each frame</span>
          <div class="input-row">
            <input id="padding-input" type="number" min="0" max="200" step="4" value="32" />
            <span class="input-suffix">dp</span>
          </div>
        </label>
        <div class="button-row">
          <button class="button button--primary" id="fit-button" type="button">
            Shrink selected frames
          </button>
        </div>
      </section>

      <section class="card">
        <div class="section-title-row">
          <h2>Last run</h2>
          <span class="mini-pill" id="result-summary">Nothing yet</span>
        </div>
        <ul class="results" id="result-list"></ul>
      </section>

      <span class="visually-hidden" id="selection-count">0</span>
    </div>
  </body>
</html>
